<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PinguBuy - 专业代购服务平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/pingubuy.css">
</head>
<body>
    <!-- 顶部导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <!-- Logo -->
            <a class="navbar-brand d-flex align-items-center" href="#">
                <div class="logo-container">
                    <i class="fas fa-snowman text-primary me-2"></i>
                    <span class="fw-bold text-primary">PINGU</span><span class="fw-bold text-dark">BUY</span>
                </div>
            </a>

            <!-- 移动端菜单按钮 -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- 导航菜单 -->
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#">首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">运费估算</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">更多功能</a>
                    </li>
                </ul>

                <!-- 搜索框 -->
                <form class="d-flex me-3 flex-grow-1" style="max-width: 400px;">
                    <div class="input-group">
                        <input class="form-control search-input" type="search" placeholder="请输入淘宝链接或者关键字" value="衣服">
                        <button class="btn btn-primary" type="submit">
                            <i class="fas fa-search"></i>
                        </button>
                    </div>
                </form>

                <!-- 语言和货币选择器 -->
                <div class="d-flex align-items-center">
                    <div class="dropdown me-3">
                        <button class="btn btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown">
                            <i class="fas fa-globe me-1"></i>中文/USD
                        </button>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#">中文/USD</a></li>
                            <li><a class="dropdown-item" href="#">English/USD</a></li>
                            <li><a class="dropdown-item" href="#">中文/CNY</a></li>
                        </ul>
                    </div>
                    <a href="#" class="btn btn-outline-primary">
                        <i class="fas fa-user me-1"></i>登录
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- 搜索结果信息 -->
    <div class="search-info bg-light py-3">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <span class="text-muted">正在搜索 "</span>
                    <span class="fw-bold text-primary">衣服</span>
                    <span class="text-muted">"，为你找到以下商品</span>
                </div>
                <div class="text-end">
                    <span class="text-muted">已同意</span>
                    <a href="#" class="text-primary text-decoration-none">《搜索服务条款》</a>
                </div>
            </div>
        </div>
    </div>

    <!-- 搜索结果统计 -->
    <div class="container my-4">
        <div class="row">
            <div class="col-12 text-center">
                <h2 class="display-4 fw-bold text-primary mb-3">1688</h2>
                <nav class="nav justify-content-center">
                    <a class="nav-link active fw-bold text-primary border-bottom border-primary border-3 pb-2" href="#">Taobao</a>
                </nav>
            </div>
        </div>
    </div>

    <!-- 商品列表 -->
    <div class="container">
        <div class="row g-4" id="productGrid">
            <!-- 商品卡片将通过JavaScript动态生成 -->
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="bg-dark text-light mt-5 py-4">
        <div class="container">
            <div class="row">
                <div class="col-md-6">
                    <h5>PinguBuy</h5>
                    <p class="text-muted">专业的中国商品代购服务平台</p>
                </div>
                <div class="col-md-6 text-md-end">
                    <p class="text-muted">&copy; 2024 PinguBuy. All rights reserved.</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/pingubuy.js"></script>
</body>
</html>
