<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品列表 - PinguMall</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <!-- 顶部导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="fas fa-shopping-bag me-2"></i>PinguMall
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav me-auto">
                    <a class="nav-link" href="index.html">首页</a>
                    <a class="nav-link active" href="products.html">商品</a>
                    <div class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            分类
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="products.html?category=electronics">电子产品</a></li>
                            <li><a class="dropdown-item" href="products.html?category=fashion">时尚服饰</a></li>
                            <li><a class="dropdown-item" href="products.html?category=home">家居生活</a></li>
                            <li><a class="dropdown-item" href="products.html?category=sports">运动户外</a></li>
                        </ul>
                    </div>
                </div>
                <!-- 搜索框 -->
                <form class="d-flex me-3" role="search" onsubmit="searchProducts(event)">
                    <input class="form-control me-2" type="search" placeholder="搜索商品..." id="searchInput">
                    <button class="btn btn-outline-light" type="submit">
                        <i class="fas fa-search"></i>
                    </button>
                </form>
                <!-- 用户菜单 -->
                <div class="navbar-nav">
                    <a class="nav-link" href="cart.html">
                        <i class="fas fa-shopping-cart"></i>
                        购物车 <span class="badge bg-danger" id="cartCount">0</span>
                    </a>
                    <a class="nav-link" href="login.html">登录</a>
                    <a class="nav-link" href="register.html">注册</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- 面包屑导航 -->
    <nav aria-label="breadcrumb" class="bg-light py-2">
        <div class="container">
            <ol class="breadcrumb mb-0">
                <li class="breadcrumb-item"><a href="index.html">首页</a></li>
                <li class="breadcrumb-item active" aria-current="page" id="breadcrumbCategory">商品列表</li>
            </ol>
        </div>
    </nav>

    <div class="container my-4">
        <div class="row">
            <!-- 侧边栏筛选 -->
            <div class="col-lg-3">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">商品筛选</h5>
                    </div>
                    <div class="card-body">
                        <!-- 分类筛选 -->
                        <div class="mb-4">
                            <h6>商品分类</h6>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="category" value="" id="categoryAll" checked>
                                <label class="form-check-label" for="categoryAll">全部分类</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="category" value="electronics" id="categoryElectronics">
                                <label class="form-check-label" for="categoryElectronics">电子产品</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="category" value="fashion" id="categoryFashion">
                                <label class="form-check-label" for="categoryFashion">时尚服饰</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="category" value="home" id="categoryHome">
                                <label class="form-check-label" for="categoryHome">家居生活</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="category" value="sports" id="categorySports">
                                <label class="form-check-label" for="categorySports">运动户外</label>
                            </div>
                        </div>

                        <!-- 价格筛选 -->
                        <div class="mb-4">
                            <h6>价格区间</h6>
                            <div class="row">
                                <div class="col-6">
                                    <input type="number" class="form-control form-control-sm" placeholder="最低价" id="minPrice">
                                </div>
                                <div class="col-6">
                                    <input type="number" class="form-control form-control-sm" placeholder="最高价" id="maxPrice">
                                </div>
                            </div>
                            <div class="mt-2">
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="priceRange" value="" id="priceAll" checked>
                                    <label class="form-check-label" for="priceAll">不限</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="priceRange" value="0-100" id="price0to100">
                                    <label class="form-check-label" for="price0to100">0-100元</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="priceRange" value="100-500" id="price100to500">
                                    <label class="form-check-label" for="price100to500">100-500元</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="priceRange" value="500-1000" id="price500to1000">
                                    <label class="form-check-label" for="price500to1000">500-1000元</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="priceRange" value="1000+" id="price1000plus">
                                    <label class="form-check-label" for="price1000plus">1000元以上</label>
                                </div>
                            </div>
                        </div>

                        <!-- 品牌筛选 -->
                        <div class="mb-4">
                            <h6>品牌</h6>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" value="apple" id="brandApple">
                                <label class="form-check-label" for="brandApple">Apple</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" value="samsung" id="brandSamsung">
                                <label class="form-check-label" for="brandSamsung">Samsung</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" value="nike" id="brandNike">
                                <label class="form-check-label" for="brandNike">Nike</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" value="adidas" id="brandAdidas">
                                <label class="form-check-label" for="brandAdidas">Adidas</label>
                            </div>
                        </div>

                        <button class="btn btn-primary w-100" onclick="applyFilters()">应用筛选</button>
                        <button class="btn btn-outline-secondary w-100 mt-2" onclick="clearFilters()">清除筛选</button>
                    </div>
                </div>
            </div>

            <!-- 主要内容区域 -->
            <div class="col-lg-9">
                <!-- 排序和视图选项 -->
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <span class="text-muted">找到 <span id="totalProducts">0</span> 件商品</span>
                    </div>
                    <div class="d-flex align-items-center gap-3">
                        <div class="d-flex align-items-center">
                            <label class="form-label me-2 mb-0">排序：</label>
                            <select class="form-select form-select-sm" id="sortSelect" onchange="sortProducts()">
                                <option value="default">默认排序</option>
                                <option value="price-low">价格从低到高</option>
                                <option value="price-high">价格从高到低</option>
                                <option value="name">名称排序</option>
                                <option value="rating">评分排序</option>
                            </select>
                        </div>
                        <div class="btn-group" role="group">
                            <button type="button" class="btn btn-outline-secondary btn-sm active" id="gridView" onclick="toggleView('grid')">
                                <i class="fas fa-th"></i>
                            </button>
                            <button type="button" class="btn btn-outline-secondary btn-sm" id="listView" onclick="toggleView('list')">
                                <i class="fas fa-list"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 商品列表 -->
                <div class="row" id="productGrid">
                    <!-- 动态生成商品卡片 -->
                </div>

                <!-- 分页 -->
                <nav aria-label="商品分页" class="mt-4">
                    <ul class="pagination justify-content-center" id="pagination">
                        <!-- 动态生成分页 -->
                    </ul>
                </nav>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="bg-dark text-light py-5">
        <div class="container">
            <div class="row">
                <div class="col-md-4">
                    <h5>关于我们</h5>
                    <p>PinguMall 致力于为用户提供优质的购物体验，精选全球好物，品质保证。</p>
                </div>
                <div class="col-md-4">
                    <h5>客户服务</h5>
                    <ul class="list-unstyled">
                        <li><a href="#" class="text-light">帮助中心</a></li>
                        <li><a href="#" class="text-light">退换货政策</a></li>
                        <li><a href="#" class="text-light">配送说明</a></li>
                        <li><a href="#" class="text-light">联系我们</a></li>
                    </ul>
                </div>
                <div class="col-md-4">
                    <h5>关注我们</h5>
                    <div class="social-links">
                        <a href="#" class="text-light me-3"><i class="fab fa-weixin fa-2x"></i></a>
                        <a href="#" class="text-light me-3"><i class="fab fa-weibo fa-2x"></i></a>
                        <a href="#" class="text-light"><i class="fab fa-qq fa-2x"></i></a>
                    </div>
                </div>
            </div>
            <hr class="my-4">
            <div class="text-center">
                <p>&copy; 2024 PinguMall. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <!-- 商品详情模态框 -->
    <div class="modal fade" id="productModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="productModalTitle">商品详情</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="productModalBody">
                    <!-- 动态加载商品详情 -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                    <button type="button" class="btn btn-primary" onclick="addToCartFromModal()">加入购物车</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/products.js"></script>
</body>
</html>
